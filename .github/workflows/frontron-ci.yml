name: frontron-ci

on:
  pull_request:
    paths:
      - "frontron/**"
      - ".github/workflows/frontron-ci.yml"
  push:
    branches:
      - main
    paths:
      - "frontron/**"
      - ".github/workflows/frontron-ci.yml"

jobs:
  verify:
    name: frontron / ${{ matrix.os }} / node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node:
          - 22
          - 24

    defaults:
      run:
        working-directory: frontron

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: frontron/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Package smoke
        run: npm run test:package-smoke
