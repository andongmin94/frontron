name: frontron-compatibility

on:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: "17 18 * * 0"

permissions:
  contents: read

concurrency:
  group: frontron-compatibility-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: "1"
  CSC_IDENTITY_AUTO_DISCOVERY: "false"

jobs:
  native-starter:
    name: native starter / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            frontron/package-lock.json
            create-frontron/package-lock.json

      - name: Install create-frontron
        run: npm ci
        working-directory: create-frontron

      - name: Install frontron
        run: npm ci
        working-directory: frontron

      - name: Build native installers
        run: node release.mjs matrix-smoke starter

  node-boundaries:
    name: ${{ matrix.case }} / ubuntu / node ${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        # Node 24 is covered by every primary compatibility lane below.
        node:
          - "22.15.0"
          - "26"
        case:
          - vite
          - next-standalone

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: |
            frontron/package-lock.json
            create-frontron/package-lock.json

      - name: Install create-frontron
        run: npm ci
        working-directory: create-frontron

      - name: Install frontron
        run: npm ci
        working-directory: frontron

      - name: Retrofit representative framework at Node boundary
        run: node release.mjs matrix-smoke ${{ matrix.case }}

  public-frameworks:
    name: ${{ matrix.case }} / ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        case:
          - vite
          - vitepress
          - generic-node-server
          - next-export
          - next-standalone
          - nuxt
          - remix
          - sveltekit-static
          - sveltekit-node

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            frontron/package-lock.json
            create-frontron/package-lock.json

      - name: Install create-frontron
        run: npm ci
        working-directory: create-frontron

      - name: Install frontron
        run: npm ci
        working-directory: frontron

      - name: Retrofit official framework project
        run: node release.mjs matrix-smoke ${{ matrix.case }}

  cross-platform-frameworks:
    name: ${{ matrix.case }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 75

    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
        case:
          - vite
          - next-standalone
          - nuxt
          - remix
          - sveltekit-node

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            frontron/package-lock.json
            create-frontron/package-lock.json

      - name: Install create-frontron
        run: npm ci
        working-directory: create-frontron

      - name: Install frontron
        run: npm ci
        working-directory: frontron

      - name: Retrofit representative framework project
        run: node release.mjs matrix-smoke ${{ matrix.case }}

  package-managers:
    name: ${{ matrix.manager }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        manager:
          - pnpm
          - yarn
          - bun

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            frontron/package-lock.json
            create-frontron/package-lock.json

      - name: Install create-frontron
        run: npm ci
        working-directory: create-frontron

      - name: Install frontron
        run: npm ci
        working-directory: frontron

      - name: Retrofit with package manager
        run: node release.mjs package-manager-smoke ${{ matrix.manager }} --package

  nested-pnpm-workspace:
    name: nested pnpm workspace / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontron/package-lock.json

      - name: Install frontron
        run: npm ci
        working-directory: frontron

      - name: Verify actual pnpm 11 reads a nested workspace
        run: npm test -- __tests__/pnpm-workspace-yaml.spec.ts -t "actual pnpm 11 reads default and nested generated workspace settings"
        working-directory: frontron
        env:
          FRONTRON_TEST_PNPM_11: "1"
