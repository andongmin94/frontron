version: 2

updates:
  - package-ecosystem: npm
    directory: /frontron
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    # create-frontron 버전은 release.mjs가 frontron 버전과 함께 정확히 맞춘다.
    ignore:
      - dependency-name: create-frontron

  - package-ecosystem: npm
    directory: /create-frontron
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  - package-ecosystem: npm
    directory: /create-frontron/template
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
