name: frontron-release

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: frontron-npm-release
  cancel-in-progress: false

jobs:
  compatibility:
    name: release compatibility gate
    permissions:
      contents: read
    uses: ./.github/workflows/frontron-compatibility.yml

  publish:
    name: npm trusted publish
    needs: compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 180
    environment: npm

    steps:
      - name: Require the main branch
        shell: bash
        run: test "$GITHUB_REF" = "refs/heads/main"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Require the current main commit
        shell: bash
        run: |
          git fetch --no-tags --force origin refs/heads/main:refs/remotes/origin/main
          test "$(git rev-parse HEAD)" = "$(git rev-parse refs/remotes/origin/main)"

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Use the audited npm CLI
        run: npm install --global npm@11.18.0

      - name: Verify and publish both packages
        run: node release.mjs publish
        env:
          FRONTRON_TRUSTED_PUBLISHING: "1"
