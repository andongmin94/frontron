name: frontron-ci

on:
  pull_request:
    paths:
      - "frontron/**"
      - "create-frontron/**"
      - "release.mjs"
      - "LICENSE.md"
      - ".github/workflows/**"
  push:
    branches:
      - main
    paths:
      - "frontron/**"
      - "create-frontron/**"
      - "release.mjs"
      - "LICENSE.md"
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  verify:
    name: ${{ matrix.package }} / ${{ matrix.runtime.os }} / node ${{ matrix.runtime.node }}
    runs-on: ${{ matrix.runtime.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        package:
          - frontron
          - create-frontron
        # Run the primary Node on every OS and the supported edges once on Linux.
        runtime:
          - os: ubuntu-latest
            node: "22.15.0"
          - os: ubuntu-latest
            node: "24"
          - os: ubuntu-latest
            node: "26"
          - os: macos-latest
            node: "24"
          - os: windows-latest
            node: "24"

    defaults:
      run:
        working-directory: ${{ matrix.package }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.runtime.node }}
          cache: npm
          cache-dependency-path: ${{ matrix.package }}/package-lock.json

      - name: Install
        run: npm ci

      - name: Install create-frontron package-smoke dependencies
        if: matrix.package == 'frontron'
        run: npm ci
        working-directory: ${{ github.workspace }}/create-frontron

      - name: Dependency tree
        run: npm ls --all

      - name: Check lint and formatting
        run: npm run check

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Package smoke
        run: npm run test:package-smoke

  release-verify:
    name: release verify / ubuntu / node 24
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            frontron/package-lock.json
            create-frontron/package-lock.json

      - name: Verify release metadata
        run: node release.mjs check-metadata

      - name: Install create-frontron
        run: npm ci --fund=false --audit=false
        working-directory: create-frontron

      - name: Install frontron
        run: npm ci --fund=false --audit=false
        working-directory: frontron

      - name: Audit create-frontron dependencies
        run: npm audit --audit-level=moderate
        working-directory: create-frontron

      - name: Audit frontron dependencies
        run: npm audit --audit-level=moderate
        working-directory: frontron

      - name: Check create-frontron coverage
        run: npm run coverage
        working-directory: create-frontron

      - name: Check frontron coverage
        run: npm run coverage
        working-directory: frontron

      - name: Rehearse release and audit generated template dependencies
        run: npm run test:release-smoke
        working-directory: create-frontron
