name: frontron-release

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: frontron-npm-release
  cancel-in-progress: false

jobs:
  publish:
    name: npm trusted publish
    runs-on: ubuntu-latest
    timeout-minutes: 180
    environment: npm

    steps:
      - name: Require the main branch
        shell: bash
        run: test "$GITHUB_REF" = "refs/heads/main"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Use the audited npm CLI
        run: npm install --global npm@11.18.0

      - name: Install create-frontron
        run: npm ci --fund=false --audit=false
        working-directory: create-frontron

      - name: Install frontron
        run: npm ci --fund=false --audit=false
        working-directory: frontron

      - name: Verify and publish both packages
        run: node release.mjs publish
        env:
          FRONTRON_TRUSTED_PUBLISHING: "1"
